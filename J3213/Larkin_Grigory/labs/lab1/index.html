<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aNikral — Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="card shadow-sm p-4">
      <div class="text-center mb-4">
        <div class="brand-name">a<span>Nikral</span></div>
        <p class="text-muted small mt-1">Личные финансы под контролем</p>
      </div>

      <form>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control" id="email" placeholder="example@mail.ru">
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Пароль</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••">
        </div>
        <button type="button" class="btn btn-primary w-100"
                data-bs-toggle="modal" data-bs-target="#demoModal">
          Войти
        </button>
      </form>

      <p class="text-center small text-muted mt-3 mb-0">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
      </p>
    </div>
  </div>
</div>

<div class="modal fade" id="demoModal" tabindex="-1" aria-labelledby="demoModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="demoModalLabel">Демо-режим</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
      </div>
      <div class="modal-body">
        В реальном приложении здесь была бы проверка данных. Для демонстрации сразу переходим в кабинет.
      </div>
      <div class="modal-footer">
        <a href="dashboard.html" class="btn btn-primary">Перейти в кабинет</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
