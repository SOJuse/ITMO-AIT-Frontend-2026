<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aNikral — Счета</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand brand-name" href="dashboard.html">a<span>Nikral</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Кабинет</a></li>
        <li class="nav-item"><a class="nav-link" href="transactions.html">Транзакции</a></li>
        <li class="nav-item"><a class="nav-link" href="reports.html">Отчёты</a></li>
        <li class="nav-item"><a class="nav-link active" href="accounts.html">Счета</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html">Выйти</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h4 mb-0">Счета</h1>
    <button class="btn btn-primary btn-sm"
            data-bs-toggle="modal" data-bs-target="#addAccountModal">
      + Добавить счёт
    </button>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="card p-3">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fw-semibold">Сбербанк — дебетовая</div>
            <div class="text-muted small">•••• 4521</div>
            <div class="mt-2 fw-bold">98 580 ₽</div>
          </div>
          <button class="btn btn-outline-primary btn-sm"
                  data-bs-toggle="modal" data-bs-target="#importModal">
            Импорт
          </button>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card p-3">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fw-semibold">Тинькофф — кредитная</div>
            <div class="text-muted small">•••• 8834</div>
            <div class="mt-2 fw-bold">44 000 ₽</div>
          </div>
          <button class="btn btn-outline-primary btn-sm"
                  data-bs-toggle="modal" data-bs-target="#importModal">
            Импорт
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <span class="fw-semibold">Правила категоризации</span>
      <button class="btn btn-outline-primary btn-sm"
              data-bs-toggle="modal" data-bs-target="#addRuleModal">
        + Правило
      </button>
    </div>
    <ul class="list-group list-group-flush">
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <div class="small fw-semibold">Содержит «Перекрёсток»</div>
          <small class="text-muted">→ Еда</small>
        </div>
        <button class="btn btn-outline-danger btn-sm">Удалить</button>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <div class="small fw-semibold">Содержит «Метро»</div>
          <small class="text-muted">→ Транспорт</small>
        </div>
        <button class="btn btn-outline-danger btn-sm">Удалить</button>
      </li>
    </ul>
  </div>
</main>

<div class="modal fade" id="addAccountModal" tabindex="-1" aria-labelledby="addAccountLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addAccountLabel">Добавить счёт</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label" for="acc-name">Название</label>
          <input type="text" class="form-control" id="acc-name" placeholder="Например: Сбербанк">
        </div>
        <div class="mb-3">
          <label class="form-label" for="acc-type">Тип</label>
          <select class="form-select" id="acc-type">
            <option>Дебетовая карта</option>
            <option>Кредитная карта</option>
            <option>Накопительный счёт</option>
            <option>Наличные</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label" for="acc-balance">Начальный баланс (₽)</label>
          <input type="number" class="form-control" id="acc-balance" placeholder="0">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Добавить</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="importModal" tabindex="-1" aria-labelledby="importLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="importLabel">Импорт транзакций</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label" for="import-file">Файл выписки (.csv)</label>
          <input type="file" class="form-control" id="import-file" accept=".csv">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Загрузить</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="addRuleModal" tabindex="-1" aria-labelledby="addRuleLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addRuleLabel">Новое правило</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label" for="rule-keyword">Ключевое слово</label>
          <input type="text" class="form-control" id="rule-keyword" placeholder="Например: Пятёрочка">
        </div>
        <div class="mb-3">
          <label class="form-label" for="rule-cat">Категория</label>
          <select class="form-select" id="rule-cat">
            <option>Еда</option>
            <option>Транспорт</option>
            <option>Развлечения</option>
            <option>Покупки</option>
            <option>Жильё</option>
            <option>Доход</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
