<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aNikral — Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="card shadow-sm p-4">
      <div class="text-center mb-4">
        <div class="brand-name">a<span>Nikral</span></div>
        <p class="text-muted small mt-1">Создайте аккаунт бесплатно</p>
      </div>

      <form id="register-form" aria-label="Форма регистрации">
        <div class="mb-3">
          <label class="form-label" for="reg-name">Имя</label>
          <input type="text" class="form-control" id="reg-name" placeholder="Иван Иванов" autocomplete="name">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-email">Email</label>
          <input type="email" class="form-control" id="reg-email" placeholder="example@mail.ru" autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-password">Пароль</label>
          <input type="password" class="form-control" id="reg-password" placeholder="Минимум 8 символов" autocomplete="new-password" aria-describedby="password-error">
        </div>
        <div class="mb-1">
          <label class="form-label" for="reg-confirm">Повторите пароль</label>
          <input type="password" class="form-control" id="reg-confirm" placeholder="••••••••" autocomplete="new-password" aria-describedby="password-error">
        </div>
        <div class="mb-3">
          <small id="password-error" class="text-danger d-none" aria-live="polite">Пароли не совпадают</small>
        </div>
        <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
      </form>

      <p class="text-center small text-muted mt-3 mb-0">
        Уже есть аккаунт? <a href="index.html">Войти</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
